<h1>Lsitado de Productos</h1>

@if (isLoading()) {
<p>Cargando.....</p>
}
@if (error()) {
<p>{{error()}}</p>
}
@if (!isLoading() && !error()) {
<div>
  @for (product of products(); track $index) {
  <a [routerLink]="['/product', product.slug]">
    <img [src]="product.url_image" [alt]="product.name" />
    <div>
      {{product.name}}
    </div>
  </a>
  }
</div>
}
